<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Background Image/Color */
        .cover-wrapper {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        h1 { font-size: 3.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }

        /* The Enter Button */
        .enter-button {
            padding: 15px 40px;
            font-size: 1.2rem;
            color: white;
            background-color: #27ae60;
            text-decoration: none;
            border-radius: 30px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .enter-button:hover {
            background-color: transparent;
            border: 2px solid #27ae60;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="cover-wrapper">
        <h1>Welcome to My Project</h1>
        <p>Computer Science & Engineering | Web Development</p>
        <a href="index.html" class="btn enter-button">Enter Site</a>
    </div>

</body>
</html>
